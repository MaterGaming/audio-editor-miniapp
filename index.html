<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Editor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn {
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn.secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000);
        }
        .hidden {
            display: none;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        .status.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }
        .file-info {
            background: rgba(0,0,0,0.05);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .row .btn {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio Editor</h1>
        
        <!-- Информация о файле -->
        <div class="card" id="fileCard">
            <div class="file-info" id="fileInfo">
                <strong>📁 Файл не загружен</strong>
                <p id="fileDetails" style="margin: 8px 0 0; font-size: 14px;"></p>
            </div>
            <button class="btn" id="selectFileBtn">📤 Выбрать файл в Telegram</button>
        </div>

        <!-- Эффекты -->
        <div class="card hidden" id="effectsCard">
            <h3>🎛️ Эффекты</h3>
            
            <div class="row">
                <button class="btn secondary" data-effect="volume">🔊 Громкость</button>
                <button class="btn secondary" data-effect="speed">⏩ Скорость</button>
            </div>
            <div class="row">
                <button class="btn secondary" data-effect="samplerate">🎚️ Sample Rate</button>
                <button class="btn secondary" data-effect="cut">✂️ Обрезка</button>
            </div>

            <!-- Контролы для эффектов -->
            <div id="volumeControl" class="hidden">
                <label>Громкость (dB):</label>
                <input type="number" id="volumeValue" value="0" step="0.5" min="-20" max="20">
            </div>

            <div id="speedControl" class="hidden">
                <label>Скорость (0.5 - 2.0):</label>
                <input type="number" id="speedValue" value="1.0" step="0.1" min="0.5" max="2.0">
            </div>

            <div id="samplerateControl" class="hidden">
                <label>Частота дискретизации:</label>
                <select id="samplerateValue">
                    <option value="8000">8 kHz</option>
                    <option value="16000">16 kHz</option>
                    <option value="22050">22.05 kHz</option>
                    <option value="44100" selected>44.1 kHz</option>
                    <option value="48000">48 kHz</option>
                </select>
            </div>

            <div id="cutControl" class="hidden">
                <input type="text" id="cutStart" placeholder="Начало (сек или мс) например: 5">
                <input type="text" id="cutEnd" placeholder="Конец (сек или мс) например: 30">
            </div>

            <button class="btn" id="applyEffectBtn" style="margin-top: 16px;">✅ Применить эффект</button>
        </div>

        <!-- Экспорт -->
        <div class="card hidden" id="exportCard">
            <h3>💾 Экспорт</h3>
            
            <div class="row">
                <button class="btn secondary" data-format="wav">WAV</button>
                <button class="btn secondary" data-format="mp3">MP3</button>
                <button class="btn secondary" data-format="ogg">OGG</button>
            </div>

            <div id="bitrateControl" class="hidden">
                <label>Битрейт:</label>
                <select id="bitrateValue">
                    <option value="original">Как у оригинала</option>
                    <option value="64k">64 kbps</option>
                    <option value="128k">128 kbps</option>
                    <option value="192k">192 kbps</option>
                    <option value="320k">320 kbps</option>
                </select>
            </div>

            <label>Каналы:</label>
            <select id="channelsValue">
                <option value="original">Как у оригинала</option>
                <option value="1">Моно</option>
                <option value="2">Стерео</option>
            </select>

            <label>Разрядность:</label>
            <select id="samplewidthValue">
                <option value="original">Как у оригинала</option>
                <option value="1">8 бит</option>
                <option value="2">16 бит</option>
                <option value="3">24 бит</option>
            </select>

            <button class="btn" id="exportBtn" style="margin-top: 16px; background: #4caf50;">💾 Экспортировать</button>
        </div>

        <!-- Кнопки управления -->
        <div class="row">
            <button class="btn secondary" id="resetBtn">🔄 Сбросить</button>
            <button class="btn secondary" id="closeBtn">❌ Закрыть</button>
        </div>

        <!-- Статус -->
        <div id="status" class="status"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Состояние
        let currentEffect = null;
        let selectedFormat = null;
        let hasFile = false;

        // Элементы
        const fileInfo = document.getElementById('fileInfo');
        const fileDetails = document.getElementById('fileDetails');
        const effectsCard = document.getElementById('effectsCard');
        const exportCard = document.getElementById('exportCard');
        const status = document.getElementById('status');

        // Отправка данных в бота
        function sendToBot(action, data = {}) {
            const message = JSON.stringify({
                action: action,
                ...data
            });
            tg.sendData(message);
            showStatus('info', 'Запрос отправлен...');
        }

        function showStatus(type, text) {
            status.className = 'status ' + type;
            status.textContent = text;
            setTimeout(() => {
                status.className = 'status';
                status.textContent = '';
            }, 3000);
        }

        // Выбор файла
        document.getElementById('selectFileBtn').addEventListener('click', () => {
            sendToBot('select_file');
            showStatus('info', 'Отправьте аудиофайл в чат');
        });

        // Эффекты
        document.querySelectorAll('[data-effect]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentEffect = btn.dataset.effect;
                
                // Скрываем все контролы
                document.getElementById('volumeControl').classList.add('hidden');
                document.getElementById('speedControl').classList.add('hidden');
                document.getElementById('samplerateControl').classList.add('hidden');
                document.getElementById('cutControl').classList.add('hidden');
                
                // Показываем нужный
                document.getElementById(currentEffect + 'Control').classList.remove('hidden');
            });
        });

        // Применить эффект
        document.getElementById('applyEffectBtn').addEventListener('click', () => {
            if (!currentEffect) {
                showStatus('error', 'Выберите эффект');
                return;
            }
            if (!hasFile) {
                showStatus('error', 'Сначала загрузите файл');
                return;
            }

            let value = '';
            switch(currentEffect) {
                case 'volume':
                    value = document.getElementById('volumeValue').value;
                    break;
                case 'speed':
                    value = document.getElementById('speedValue').value;
                    break;
                case 'samplerate':
                    value = document.getElementById('samplerateValue').value;
                    break;
                case 'cut':
                    value = document.getElementById('cutStart').value + ' ' + document.getElementById('cutEnd').value;
                    break;
            }

            sendToBot('apply_effect', { effect: currentEffect, value: value });
        });

        // Выбор формата
        document.querySelectorAll('[data-format]').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedFormat = btn.dataset.format;
                
                // Показываем битрейт только для mp3/ogg
                if (selectedFormat === 'mp3' || selectedFormat === 'ogg') {
                    document.getElementById('bitrateControl').classList.remove('hidden');
                } else {
                    document.getElementById('bitrateControl').classList.add('hidden');
                }
                
                showStatus('info', `Выбран формат: ${selectedFormat.toUpperCase()}`);
            });
        });

        // Экспорт
        document.getElementById('exportBtn').addEventListener('click', () => {
            if (!hasFile) {
                showStatus('error', 'Сначала загрузите файл');
                return;
            }
            if (!selectedFormat) {
                showStatus('error', 'Выберите формат');
                return;
            }

            sendToBot('export', {
                format: selectedFormat,
                bitrate: document.getElementById('bitrateValue').value,
                channels: document.getElementById('channelsValue').value,
                samplewidth: document.getElementById('samplewidthValue').value
            });
        });

        // Сброс
        document.getElementById('resetBtn').addEventListener('click', () => {
            sendToBot('reset');
            hasFile = false;
            fileInfo.innerHTML = '<strong>📁 Файл не загружен</strong>';
            fileDetails.textContent = '';
            effectsCard.classList.add('hidden');
            exportCard.classList.add('hidden');
        });

        // Закрыть
        document.getElementById('closeBtn').addEventListener('click', () => {
            tg.close();
        });

        // Слушаем сообщения от бота (для теста)
        window.addEventListener('message', (event) => {
            if (event.data && event.data.action === 'file_loaded') {
                hasFile = true;
                fileInfo.innerHTML = '<strong>📁 Файл загружен:</strong> ' + event.data.filename;
                fileDetails.textContent = event.data.details;
                effectsCard.classList.remove('hidden');
                exportCard.classList.remove('hidden');
                showStatus('success', 'Файл загружен!');
            }
        });

    </script>
</body>
</html>
